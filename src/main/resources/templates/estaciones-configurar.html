<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <title>Configurar Estación - Agro IoT</title>
    <style>
        *{ box-sizing:border-box; }
        body{
            margin:0;
            font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
            background:var(--bg-soft);
            color:var(--text-main);
        }

        .layout{
            min-height:100vh;
            display:grid;
            grid-template-columns: 260px 1fr;
        }

        .sidebar{
            background: linear-gradient(180deg, var(--primary-light), var(--primary));
            color:#fff;
            padding:18px 16px;
            height:100vh;
            position:sticky;
            top:0;
            display:flex;
            flex-direction:column;
            gap:14px;
        }
        .brand{
            font-weight:900;
            letter-spacing:.2px;
            padding:12px 12px;
            border-radius:12px;
            background: rgba(255,255,255,.10);
        }
        .nav{
            display:flex;
            flex-direction:column;
            gap:8px;
            margin-top:4px;
        }
        .nav a{
            text-decoration:none;
            color:#fff;
            padding:10px 12px;
            border-radius:12px;
            background: rgba(255,255,255,.08);
            opacity:.95;
            font-weight:700;
            position:relative;
            overflow:hidden;
            transition: transform .25s ease, background-color .25s ease, box-shadow .25s ease;
        }
        .nav a::after{
            content:"";
            position:absolute;
            left:8px;
            right:8px;
            bottom:4px;
            height:2px;
            border-radius:999px;
            background:rgba(255,255,255,.9);
            transform:scaleX(0);
            transform-origin:left;
            transition:transform .25s ease;
        }
        .nav a:hover{
            transform: translateX(4px);
            background: rgba(255,255,255,.16);
            box-shadow: 0 6px 14px rgba(0,0,0,.14);
        }
        .nav a:hover::after,
        .nav a.active::after{
            transform:scaleX(1);
        }
        .nav a.active{
            background: rgba(255,255,255,.18);
        }

        .sidebar-footer{
            margin-top:auto;
            padding-top:12px;
            border-top:1px solid rgba(255,255,255,.18);
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .user-box{
            font-size:12px;
            opacity:.9;
            line-height:1.35;
        }

        .main{
            padding:22px 22px 40px;
        }

        .topbar{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:16px;
            flex-wrap:wrap;
            margin-bottom:14px;
        }
        .title h1{
            margin:0;
            font-size:22px;
            font-weight:900;
        }
        .title p{
            margin:6px 0 0;
            color:var(--text-soft);
            font-size:13px;
            font-weight:600;
        }

        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:10px 14px;
            border-radius:12px;
            text-decoration:none;
            font-weight:800;
            border:1px solid var(--border);
            background:#fff;
            color:var(--text-main);
            cursor:pointer;
            white-space:nowrap;
        }

        .btn-logout{
            background:#111827;
            color:#fff;
            border-color:#111827;
        }

        .estacion-card{
            background:#fff;
            border:1px solid #ebeff5;
            border-radius:16px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, .08);
            padding:18px;
            transition: transform .28s ease, box-shadow .28s ease;
            max-width: 780px;
        }
        .estacion-card:hover{
            transform: translateY(-6px);
            box-shadow: 0 20px 36px rgba(15, 23, 42, .16);
        }
        .estacion-head{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
            margin-bottom:14px;
        }
        .estacion-title{
            margin:0;
            font-size:24px;
            font-weight:900;
            letter-spacing:.3px;
            color:#0f172a;
        }
        .estacion-sub{
            margin:4px 0 0;
            color:#64748b;
            font-size:13px;
            font-weight:700;
        }

        .sensor-list{
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        .sensor-row{
            border:1px solid #eef2f7;
            border-radius:12px;
            padding:10px 12px;
            background:#fcfdff;
            transition: background-color .22s ease, transform .22s ease, border-color .22s ease;
        }
        .sensor-row:hover{
            background:#f4f9ff;
            transform: translateX(4px);
            border-color:#dbe8f8;
        }
        .sensor-main{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
        }
        .sensor-info{
            display:flex;
            align-items:center;
            gap:10px;
            min-width:0;
        }
        .sensor-icon{
            width:28px;
            height:28px;
            border-radius:8px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            background:#ecfdf3;
            font-size:15px;
            font-weight:900;
            color:#0f766e;
            flex-shrink:0;
        }
        .sensor-name{
            color:#475569;
            font-weight:800;
            font-size:13px;
        }
        .sensor-value-wrap{
            display:flex;
            align-items:baseline;
            gap:6px;
            flex-shrink:0;
        }
        .sensor-value{
            font-weight:900;
            font-size:15px;
            color:#111827;
        }
        .sensor-unit{
            font-size:12px;
            color:#64748b;
            font-weight:700;
        }
        .sensor-actions{
            display:flex;
            align-items:center;
            gap:8px;
            flex-shrink:0;
        }
        .sensor-status{
            font-size:11px;
            font-weight:800;
            border-radius:999px;
            padding:4px 8px;
            border:1px solid transparent;
        }
        .sensor-status.on{
            color:#166534;
            background:#dcfce7;
            border-color:#bbf7d0;
        }
        .sensor-status.off{
            color:#854d0e;
            background:#fef9c3;
            border-color:#fde68a;
        }
        .btn-sensor-toggle{
            border-radius:999px;
            padding:7px 12px;
            border:1px solid transparent;
            font-weight:800;
            cursor:pointer;
            background:#fff;
        }
        .btn-sensor-toggle.on{
            background:#fee2e2;
            border-color:#fecaca;
            color:#991b1b;
        }
        .btn-sensor-toggle.off{
            background:#dcfce7;
            border-color:#bbf7d0;
            color:#166534;
        }
        .progress-track{
            margin-top:8px;
            height:7px;
            border-radius:999px;
            background:#e8eef6;
            overflow:hidden;
        }
        .progress-fill{
            height:100%;
            border-radius:999px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }
        .progress-fill.luz{
            background: linear-gradient(90deg, #facc15, #f59e0b);
        }
        .progress-fill{
            width:0;
            transition: width 1.2s cubic-bezier(.22,1,.36,1);
        }

        .animate-item{
            opacity:0;
            transform: translateY(18px);
            transition: opacity .55s ease, transform .55s ease;
        }
        .animate-item.is-visible{
            opacity:1;
            transform: translateY(0);
        }

        @media (max-width: 980px){
            .layout{ grid-template-columns: 1fr; }
            .sidebar{ position:relative; height:auto; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Agro IoT</div>

        <nav class="nav">
            <a th:href="@{/mediciones}">Dashboard</a>
            <a href="#">Sensores</a>
            <a th:href="@{/historial}">Historial</a>
            <a th:href="@{/estaciones}" class="active">Estaciones</a>
            <a href="#">Alertas</a>
            <a href="#">Reportes</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-box">
                Conectado como:<br>
                <b>admin</b><br>
                Administrador
            </div>

            <form method="post" th:action="@{/logout}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-logout" style="width:100%;">Cerrar Sesión</button>
            </form>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="title">
                <h1>Configuración de estación</h1>
                <p th:text="|Sensores de ${estacion.codigo}|">Sensores de estación</p>
            </div>
            <a class="btn" th:href="@{/estaciones}">Volver a estaciones</a>
        </div>

        <article class="estacion-card animate-item">
            <div class="estacion-head">
                <div>
                    <h2 class="estacion-title" th:text="${estacion.codigo}">EST-000</h2>
                    <p class="estacion-sub"
                       th:text="${estacion.descripcion != null and !#strings.isEmpty(estacion.descripcion) ? estacion.descripcion : estacion.codigo}">
                        Nombre estación
                    </p>
                </div>
            </div>

            <div class="sensor-list">
                <div class="sensor-row"
                     th:each="sensor : ${sensores}"
                     th:with="valorNumero=${sensor.valor != '--' ? #strings.substringBefore(sensor.valor, ' ') : '--'},
                                  unidad=${sensor.valor != '--' and #strings.contains(sensor.valor, ' ') ? #strings.substringAfter(sensor.valor, ' ') : ''},
                                  rawValor=${sensor.valor != '--' ? #strings.replace(valorNumero, ',', '.') : '0'},
                                  baseNumero=${T(java.lang.Double).parseDouble(rawValor)},
                                  progreso=${sensor.tipoSensor == 'Intensidad de Luz Solar' ? T(java.lang.Math).min(100d, T(java.lang.Math).max(0d, baseNumero / 10d)) : T(java.lang.Math).min(100d, T(java.lang.Math).max(0d, baseNumero))}">
                    <div class="sensor-main">
                        <div class="sensor-info">
                            <span class="sensor-name" th:text="${sensor.tipoSensor}">Tipo sensor</span>
                        </div>
                        <div class="sensor-actions">
                            <div class="sensor-value-wrap">
                                <span class="sensor-value" th:text="${valorNumero}">--</span>
                                <span class="sensor-unit" th:if="${unidad != ''}" th:text="${unidad}">%</span>
                            </div>
                            <span class="sensor-status"
                                  th:classappend="${sensor.activo} ? ' on' : ' off'"
                                  th:text="${sensor.activo} ? 'Activo' : 'Inactivo'">Activo</span>
                            <form method="post" th:action="@{/estaciones/{id}/configurar/sensores(id=${estacion.id})}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="tipoSensor" th:value="${sensor.tipoSensor}" />
                                <input type="hidden" name="activo" th:value="${!sensor.activo}" />
                                <button type="submit"
                                        class="btn-sensor-toggle"
                                        th:classappend="${sensor.activo} ? ' on' : ' off'"
                                        th:text="${sensor.activo} ? 'Desactivar' : 'Activar'">Desactivar</button>
                            </form>
                        </div>
                    </div>

                    <div class="progress-track"
                         th:if="${sensor.tipoSensor == 'Humedad del Suelo' or sensor.tipoSensor == 'Intensidad de Luz Solar'}">
                        <div class="progress-fill"
                             th:classappend="${sensor.tipoSensor == 'Intensidad de Luz Solar'} ? ' luz' : ''"
                             th:style="|--target-width:${#numbers.formatDecimal(progreso, 1, 0)}%|">
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const animatedItems = document.querySelectorAll('.animate-item');
        animatedItems.forEach((el, index) => {
            setTimeout(() => el.classList.add('is-visible'), 70 * index);
        });

        const progressBars = document.querySelectorAll('.progress-fill');
        requestAnimationFrame(() => {
            progressBars.forEach((bar) => {
                const target = bar.style.getPropertyValue('--target-width') || '0%';
                bar.style.width = target;
            });
        });
    });
</script>
</body>
</html>
