<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="appSidebar(activeMenu)" data-sidebar>
    <button class="sidebar-toggle" type="button" aria-label="Contraer barra lateral" aria-expanded="true" data-sidebar-toggle>
        <span class="sidebar-toggle-icon" aria-hidden="true">←</span>
    </button>
    <div class="brand">
        <span class="brand-icon">☁️</span>
        <span class="brand-title">AGRO IOT</span>
        <span class="brand-subtitle">Monitoreo de cultivos</span>
    </div>

    <nav class="nav">
        <a th:href="@{/mediciones}" th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
            <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
        </a>
        <a th:href="@{/estaciones}" th:classappend="${activeMenu == 'estaciones'} ? ' active' : ''">
            <span class="nav-icon">🌦️</span><span class="nav-label">Estaciones</span>
        </a>
        <a th:href="@{/alertas}" th:classappend="${activeMenu == 'alertas'} ? ' active' : ''">
            <span class="nav-icon">⚠️</span><span class="nav-label">Alertas</span>
        </a>
        <a th:href="@{/historial}" th:classappend="${activeMenu == 'reportes'} ? ' active' : ''">
            <span class="nav-icon">📈</span><span class="nav-label">Reportes</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-box user-profile-card">
            <div class="user-avatar" th:text="${#strings.substring(sidebarUsuarioNombre, 0, 1)}">U</div>
            <div class="user-meta">
                <span class="user-label">Conectado como</span>
                <strong class="user-name" th:text="${sidebarUsuarioNombre}">Usuario</strong>
                <span class="user-role" th:text="${sidebarUsuarioRol}">Usuario</span>
            </div>
        </div>

        <form method="post" th:action="@{/logout}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-logout" style="width:100%;">Cerrar Sesión</button>
        </form>
    </div>
    <script>
        (function () {
            const storageKey = 'agroIoT.sidebarCollapsed';
            const sidebar = document.querySelector('[data-sidebar]');
            const layout = sidebar ? sidebar.closest('.layout') : null;
            const toggle = sidebar ? sidebar.querySelector('[data-sidebar-toggle]') : null;
            const icon = toggle ? toggle.querySelector('.sidebar-toggle-icon') : null;

            if (!sidebar || !layout || !toggle || !icon) {
                return;
            }

            const setCollapsed = function (collapsed) {
                sidebar.classList.toggle('is-collapsed', collapsed);
                layout.classList.toggle('sidebar-collapsed', collapsed);
                toggle.setAttribute('aria-expanded', String(!collapsed));
                toggle.setAttribute('aria-label', collapsed ? 'Expandir barra lateral' : 'Contraer barra lateral');
                icon.textContent = collapsed ? '→' : '←';
            };

            setCollapsed(localStorage.getItem(storageKey) === 'true');

            toggle.addEventListener('click', function () {
                const collapsed = !sidebar.classList.contains('is-collapsed');
                setCollapsed(collapsed);
                localStorage.setItem(storageKey, String(collapsed));
            });
        }());
    </script>
</aside>
</body>
</html>
