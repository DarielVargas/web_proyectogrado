<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - AgroSat IoT</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">
</head>
<body>
<main class="login-page">
    <section class="login-card">
        <div class="logo-wrapper" aria-hidden="true">
            <div class="logo-circle">
                <svg viewBox="0 0 24 24" role="img" aria-label="Cloud icon">
                    <path d="M7.5 18a4.5 4.5 0 0 1-.35-8.98A5.76 5.76 0 0 1 18 10a3.5 3.5 0 1 1 0 7H7.5Z"/>
                </svg>
            </div>
        </div>

        <h1>AgroSat IoT</h1>
        <p class="subtitle">Monitoreo inteligente de cultivos de banano</p>

        <div class="alert error" th:if="${param.error}">
            Usuario o contraseña incorrectos
        </div>
        <div class="alert logout" th:if="${param.logout}">
            Sesión cerrada correctamente
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="username">Usuario</label>
            <div class="input-group">
                <span class="icon" aria-hidden="true">👤</span>
                <input id="username" name="username" type="text" placeholder="Ingrese su usuario" required autofocus>
            </div>

            <label for="password">Contraseña</label>
            <div class="input-group">
                <span class="icon" aria-hidden="true">🔒</span>
                <input id="password" name="password" type="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit">Iniciar Sesión</button>
        </form>
    </section>
</main>
</body>
</html>
