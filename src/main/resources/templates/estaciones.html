<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <title>Gestión de Estaciones - Agro IoT</title>
    <style>
        *{ box-sizing:border-box; }
        body{ margin:0; font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg-soft); color:var(--text-main); }
        .layout{ min-height:100vh; display:grid; grid-template-columns: 260px 1fr; }
        .main{ padding:22px 22px 40px; }
        .title{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
        .title h1{ margin:0; font-size:22px; font-weight:900; color:var(--primary-dark); }
        .title p{ margin:6px 0 0; color:var(--text-soft); font-size:13px; font-weight:600; }
        .title-info{ min-width:0; }
        .btn-add{ background:#16a34a; color:#fff; border-color:#15803d; border-radius:999px; box-shadow:0 10px 24px rgba(21,128,61,.24); transition: transform .22s ease, box-shadow .22s ease, filter .22s ease; }
        .btn-add:hover{ transform: translateY(-1px); box-shadow:0 14px 26px rgba(21,128,61,.32); filter:brightness(1.03); }
        .alert-exito{ margin-top:14px; background:#dcfce7; border:1px solid #86efac; color:#166534; padding:12px 14px; border-radius:12px; font-weight:700; }
        .alert-error{ margin-top:10px; background:#fee2e2; border:1px solid #fecaca; color:#991b1b; padding:12px 14px; border-radius:12px; font-weight:700; }
        .btn{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:12px; text-decoration:none; font-weight:800; border:1px solid var(--border); background:#fff; color:var(--text-main); cursor:pointer; white-space:nowrap; }
        .estaciones-lista{ margin-top:18px; display:flex; flex-direction:column; gap:14px; }
        .estacion-fila{ background:#fff; border:1px solid #e7ecf2; border-radius:14px; box-shadow: 0 8px 22px rgba(15, 23, 42, .06); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease; }
        .estacion-fila:hover{ transform: translateY(-6px); box-shadow: 0 20px 34px rgba(15, 23, 42, .14); border-color:#d7e2ef; }
        .estacion-info{ display:flex; align-items:flex-start; gap:12px; min-width:0; }
        .estado-dot{ width:11px; height:11px; border-radius:50%; margin-top:7px; box-shadow:0 0 0 3px rgba(0,0,0,.04); flex-shrink:0; }
        .estado-dot.activa{ background:#22c55e; }
        .estado-dot.inactiva{ background:#ef4444; }
        .estacion-nombre{ margin:0; font-size:18px; font-weight:800; color:#0f172a; }
        .estacion-sub{ margin:4px 0 0; font-size:13px; color:#64748b; font-weight:600; }
        .fila-actions{ display:flex; align-items:center; gap:10px; }
        .btn-info, .btn-config{ border-radius:999px; padding:10px 16px; border:1px solid #d7dce4; background:#fff; font-weight:800; text-decoration:none; color:#1f2937; transition: transform .22s ease, background-color .22s ease, box-shadow .22s ease; }
        .btn-info{ border-color:#bfdbfe; background:#eff6ff; color:#1d4ed8; }
        .btn-info:hover, .btn-config:hover{ background:#f8fafc; transform: translateY(-1px) scale(1.02); box-shadow: 0 10px 20px rgba(15,23,42,.12); }
        .btn-info:hover{ background:#dbeafe; }
        .btn-toggle{ border-radius:999px; padding:10px 16px; border:1px solid transparent; font-weight:800; cursor:pointer; transition: transform .22s ease, filter .22s ease, box-shadow .22s ease; }
        .btn-toggle:hover{ transform: translateY(-1px) scale(1.02); }
        .btn-toggle.on{ background:#fee2e2; border-color:#fecaca; color:#991b1b; }
        .btn-toggle.on:hover{ box-shadow:0 10px 20px rgba(127,29,29,.16); }
        .btn-toggle.off{ background:#dcfce7; border-color:#bbf7d0; color:#166534; }
        .btn-toggle.off:hover{ box-shadow:0 10px 20px rgba(22,101,52,.16); }
        .vacio{ background:#fff; border:1px dashed #d7dce4; border-radius:14px; padding:20px; color:#64748b; }
        .animate-item{ opacity:0; transform: translateY(18px); transition: opacity .55s ease, transform .55s ease; }
        .animate-item.is-visible{ opacity:1; transform: translateY(0); }
        @media (max-width: 980px){ .layout{ grid-template-columns: 1fr; } .sidebar{ position:relative; height:auto; } }
        @media (max-width: 700px){ .estacion-fila{ flex-direction:column; align-items:flex-start; } .fila-actions{ width:100%; } }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('estaciones')}"></aside>

    <main class="main">
        <div class="title">
            <div class="title-info">
                <h1>Gestión de Estaciones</h1>
                <p>Configuración y estado de todas las estaciones del sistema</p>
            </div>
            <a class="btn btn-add" th:href="@{/estaciones/nueva}">➕ Agregar estación</a>
        </div>

        <div class="alert-exito" th:if="${mensajeExito}" th:text="${mensajeExito}">Estación creada correctamente</div>
        <div class="alert-error" th:if="${mensajeError}" th:text="${mensajeError}">Error</div>

        <section class="estaciones-lista">
            <article class="estacion-fila animate-item" th:each="item : ${estaciones}">
                <div class="estacion-info">
                    <span class="estado-dot" th:classappend="${item.activa} ? ' activa' : ' inactiva'"></span>
                    <div>
                        <h2 class="estacion-nombre" th:text="${item.estacion.descripcion != null and !#strings.isEmpty(item.estacion.descripcion) ? item.estacion.descripcion : item.estacion.codigo}">EST-001 - Norte</h2>
                        <p class="estacion-sub" th:text="${item.estacion.descripcion != null and !#strings.isEmpty(item.estacion.descripcion) ? item.estacion.descripcion : item.estacion.codigo}">Zona Norte</p>
                    </div>
                </div>
                <div class="fila-actions">
                    <a class="btn-info" th:href="@{/estaciones/{codigo}/info(codigo=${item.estacion.codigo})}">Información</a>
                    <a class="btn-config" th:href="@{/estaciones/{id}/configurar(id=${item.estacion.id})}">Configurar</a>
                    <form method="post" th:action="@{/estaciones/{id}/toggle(id=${item.estacion.id})}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit"
                                class="btn-toggle"
                                th:classappend="${item.activa} ? ' on' : ' off'"
                                th:text="${item.activa} ? 'Desactivar' : 'Activar'">
                            Desactivar
                        </button>
                    </form>
                </div>
            </article>

            <div class="vacio animate-item" th:if="${#lists.isEmpty(estaciones)}">
                No hay estaciones registradas actualmente.
            </div>
        </section>
    </main>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const animatedItems = document.querySelectorAll('.animate-item');
        animatedItems.forEach((el, index) => {
            setTimeout(() => el.classList.add('is-visible'), 70 * index);
        });
    });
</script>

<script th:src="@{/js/alertas-globales.js}" src="/js/alertas-globales.js"></script>
</body>
</html>
