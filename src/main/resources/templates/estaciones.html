<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <title>Gestión de Estaciones - Agro IoT</title>
    <style>
        *{ box-sizing:border-box; }
        body{ margin:0; font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg-soft); color:var(--text-main); }
        .layout{ min-height:100vh; display:grid; grid-template-columns: 260px 1fr; }
        .sidebar{ background: linear-gradient(180deg, var(--primary-light), var(--primary)); color:#fff; padding:18px 16px; height:100vh; position:sticky; top:0; display:flex; flex-direction:column; gap:14px; }
        .brand{ font-weight:900; letter-spacing:.2px; padding:12px 12px; border-radius:12px; background: rgba(255,255,255,.10); }
        .nav{ display:flex; flex-direction:column; gap:8px; margin-top:4px; }
        .nav a{ text-decoration:none; color:#fff; padding:10px 12px; border-radius:12px; background: rgba(255,255,255,.08); opacity:.95; font-weight:700; }
        .nav a.active{ background: rgba(255,255,255,.18); }
        .sidebar-footer{ margin-top:auto; padding-top:12px; border-top:1px solid rgba(255,255,255,.18); display:flex; flex-direction:column; gap:10px; }
        .user-box{ font-size:12px; opacity:.9; line-height:1.35; }
        .main{ padding:22px 22px 40px; }
        .title h1{ margin:0; font-size:22px; font-weight:900; }
        .title p{ margin:6px 0 0; color:var(--text-soft); font-size:13px; font-weight:600; }
        .btn{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:12px; text-decoration:none; font-weight:800; border:1px solid var(--border); background:#fff; color:var(--text-main); cursor:pointer; white-space:nowrap; }
        .btn-logout{ background:#111827; color:#fff; border-color:#111827; }
        .estaciones-lista{ margin-top:18px; display:flex; flex-direction:column; gap:14px; }
        .estacion-fila{ background:#fff; border:1px solid #e7ecf2; border-radius:14px; box-shadow: 0 8px 22px rgba(15, 23, 42, .06); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
        .estacion-info{ display:flex; align-items:flex-start; gap:12px; min-width:0; }
        .estado-dot{ width:11px; height:11px; border-radius:50%; margin-top:7px; box-shadow:0 0 0 3px rgba(0,0,0,.04); flex-shrink:0; }
        .estado-dot.activa{ background:#22c55e; }
        .estado-dot.inactiva{ background:#ef4444; }
        .estacion-nombre{ margin:0; font-size:18px; font-weight:800; color:#0f172a; }
        .estacion-sub{ margin:4px 0 0; font-size:13px; color:#64748b; font-weight:600; }
        .btn-config{ border-radius:999px; padding:10px 16px; border:1px solid #d7dce4; background:#fff; font-weight:800; text-decoration:none; color:#1f2937; }
        .btn-config:hover{ background:#f8fafc; }
        .vacio{ background:#fff; border:1px dashed #d7dce4; border-radius:14px; padding:20px; color:#64748b; }
        @media (max-width: 980px){ .layout{ grid-template-columns: 1fr; } .sidebar{ position:relative; height:auto; } }
        @media (max-width: 700px){ .estacion-fila{ flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Agro IoT</div>
        <nav class="nav">
            <a th:href="@{/mediciones}">Dashboard</a>
            <a href="#">Sensores</a>
            <a th:href="@{/historial}">Historial</a>
            <a th:href="@{/estaciones}" class="active">Estaciones</a>
            <a href="#">Alertas</a>
            <a href="#">Reportes</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-box">Conectado como:<br><b>admin</b><br>Administrador</div>
            <form method="post" th:action="@{/logout}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-logout" style="width:100%;">Cerrar Sesión</button>
            </form>
        </div>
    </aside>

    <main class="main">
        <div class="title">
            <h1>Gestión de Estaciones</h1>
            <p>Configuración y estado de todas las estaciones del sistema</p>
        </div>

        <section class="estaciones-lista">
            <article class="estacion-fila" th:each="estacion : ${estaciones}">
                <div class="estacion-info">
                    <span class="estado-dot" th:classappend="${estacion.activa == null or estacion.activa} ? ' activa' : ' inactiva'"></span>
                    <div>
                        <h2 class="estacion-nombre" th:text="${estacion.descripcion != null and !#strings.isEmpty(estacion.descripcion) ? estacion.descripcion : estacion.codigo}">EST-001 - Norte</h2>
                        <p class="estacion-sub" th:text="${estacion.ubicacion != null and !#strings.isEmpty(estacion.ubicacion) ? estacion.ubicacion : estacion.codigo}">Zona Norte</p>
                    </div>
                </div>
                <a class="btn-config" th:href="@{/estaciones/{id}/configurar(id=${estacion.id})}">Configurar</a>
            </article>

            <div class="vacio" th:if="${#lists.isEmpty(estaciones)}">
                No hay estaciones registradas actualmente.
            </div>
        </section>
    </main>
</div>
</body>
</html>
