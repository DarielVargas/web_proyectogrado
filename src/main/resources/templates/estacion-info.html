<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
    <title>Información de Estación - Agro IoT</title>
    <style>
        *{ box-sizing:border-box; }
        body{ margin:0; font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg-soft); color:var(--text-main); }
        .layout{ min-height:100vh; display:grid; grid-template-columns: 260px 1fr; }
                .main{ padding:22px 22px 40px; }
        .title h1{ margin:0; font-size:22px; font-weight:900; color:var(--primary-dark); }
        .title p{ margin:6px 0 0; color:var(--text-soft); font-size:13px; font-weight:600; }
        .card{ margin-top:16px; background:#fff; border:1px solid #e7ecf2; border-radius:16px; box-shadow: 0 10px 24px rgba(15,23,42,.08); padding:20px; max-width:760px; }
        .info-grid{ display:grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap:16px; }
        .info-item{ background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:12px 14px; }
        .info-label{ margin:0; color:#64748b; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
        .info-value{ margin:6px 0 0; color:#0f172a; font-size:17px; font-weight:800; }
        .estado-ok{ color:#166534; }
        .estado-off{ color:#991b1b; }
        .btn{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:12px; text-decoration:none; font-weight:800; border:1px solid var(--border); background:#fff; color:var(--text-main); cursor:pointer; white-space:nowrap; }
        .btn-volver{ margin-top:18px; border-radius:999px; padding:10px 16px; border:1px solid #d7dce4; background:#fff; color:#1f2937; }
        @media (max-width: 980px){ .layout{ grid-template-columns: 1fr; } .sidebar{ position:relative; height:auto; } }
        @media (max-width: 700px){ .info-grid{ grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('estaciones')}"></aside>

    <main class="main">
        <div class="title">
            <h1>INFORMACIÓN DE LA ESTACIÓN</h1>
            <p>Detalle de la estación seleccionada</p>
        </div>

        <section class="card">
            <div class="info-grid">
                <div class="info-item">
                    <p class="info-label">Código</p>
                    <p class="info-value" th:text="${estacion.codigo}">EST-001</p>
                </div>
                <div class="info-item">
                    <p class="info-label">Descripción</p>
                    <p class="info-value" th:text="${estacion.descripcion}">Estación Norte - Finca 1 (Sector A1)</p>
                </div>
                <div class="info-item">
                    <p class="info-label">Parcela</p>
                    <p class="info-value" th:text="${estacion.parcelaId}">1</p>
                </div>
                <div class="info-item">
                    <p class="info-label">Fecha de instalación</p>
                    <p class="info-value" th:text="${fechaInstalacionFormateada}">1 de febrero de 2026</p>
                </div>
                <div class="info-item">
                    <p class="info-label">Estado</p>
                    <p class="info-value" th:classappend="${estadoEstacion == 'Operativa'} ? ' estado-ok' : ' estado-off'" th:text="${estadoEstacion}">Operativa</p>
                </div>
            </div>
            <a th:href="@{/estaciones}" class="btn btn-volver">Volver</a>
        </section>
    </main>
</div>

<script th:src="@{/js/alertas-globales.js}" src="/js/alertas-globales.js"></script>
</body>
</html>
