<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mediciones - Agro IoT</title>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }

        .topbar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid transparent;
        }

        .btn-recargar { background:#28a745; color:white; }
        .btn-recargar:hover { background:#218838; }

        .logout-form {
            margin-left: auto;
        }

        .btn-logout {
            background:#343a40;
            color:white;
            cursor:pointer;
        }

        .btn-logout:hover { background:#23272b; }

        .btn-page {
            background: #ffffff;
            color: #333;
            border-color: #ddd;
        }
        .btn-page:hover { background:#f2f2f2; }

        .btn-active {
            background:#333;
            color:white;
            border-color:#333;
        }

        .btn-disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        select { padding: 6px; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
        th { background-color: #f2f2f2; text-align: left; }
        tr:nth-child(even) { background-color: #fafafa; }

        .paginacion {
            display:flex;
            gap:8px;
            align-items:center;
            margin-top: 14px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<div class="topbar">
    <h2 style="margin:0;">Vista: vw_mediciones_detalle</h2>

    <!-- Recargar mantiene page y limit -->
    <a class="btn btn-recargar"
       th:href="@{/mediciones(limit=${limit}, page=${page.number})}">
        Recargar
    </a>

    <!-- Selector: al cambiar, vuelve a page=0 -->
    <form method="get" action="/mediciones" style="display:flex; align-items:center; gap:8px;">
        <input type="hidden" name="page" value="0" />
        <label for="limit">Mostrar:</label>
        <select name="limit" id="limit" onchange="this.form.submit()">
            <option value="10" th:selected="${limit == 10}">10</option>
            <option value="20" th:selected="${limit == 20}">20</option>
            <option value="50" th:selected="${limit == 50}">50</option>
            <option value="100" th:selected="${limit == 100}">100</option>
        </select>
    </form>

    <form method="post" th:action="@{/logout}" class="logout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-logout">Cerrar Sesión</button>
    </form>
</div>

<p>
    Mostrando <b th:text="${mediciones.size()}">0</b> registros —
    Página <b th:text="${page.number + 1}">1</b> de <b th:text="${page.totalPages}">1</b>
</p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Valor</th>
        <th>Unidad</th>
        <th>Tipo Sensor</th>
        <th>Código Sensor</th>
        <th>Modelo</th>
        <th>Estación</th>
        <th>Parcela</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="m : ${mediciones}">
        <td th:text="${m.medicionId}"></td>
        <td th:text="${m.fechaMedicion}"></td>
        <td th:text="${m.valor}"></td>
        <td th:text="${m.unidadMedida}"></td>
        <td th:text="${m.tipoSensor}"></td>
        <td th:text="${m.codigoSensor}"></td>
        <td th:text="${m.modelo}"></td>
        <td th:text="${m.estacionCodigo}"></td>
        <td th:text="${m.parcelaNombre}"></td>
    </tr>

    <tr th:if="${#lists.isEmpty(mediciones)}">
        <td colspan="9">No hay datos disponibles.</td>
    </tr>
    </tbody>
</table>

<!-- PAGINACIÓN -->
<div class="paginacion" th:if="${page.totalPages > 1}">

    <!-- Ir al INICIO -->
    <a class="btn btn-page"
       th:classappend="${page.first} ? ' btn-disabled' : ''"
       th:href="@{/mediciones(limit=${limit}, page=0)}"
       title="Ir al inicio">
        ⏮
    </a>

    <!-- Anterior (igual) -->
    <a class="btn btn-page"
       th:classappend="${page.first} ? ' btn-disabled' : ''"
       th:href="@{/mediciones(limit=${limit}, page=${page.number - 1})}">
        ◀ Anterior
    </a>

    <!-- Página 1 siempre -->
    <a class="btn btn-page"
       th:classappend="${page.number == 0} ? ' btn-active' : ''"
       th:href="@{/mediciones(limit=${limit}, page=0)}">
        1
    </a>

    <!-- ... si hace falta -->
    <span th:if="${page.number > 3}" style="padding: 0 6px;">...</span>

    <!-- Ventana alrededor de la actual (una antes y una después) -->
    <span th:each="i : ${#numbers.sequence(T(java.lang.Math).max(1, page.number - 1), T(java.lang.Math).min(page.totalPages - 2, page.number + 1))}">
        <a class="btn btn-page"
           th:classappend="${i == page.number} ? ' btn-active' : ''"
           th:href="@{/mediciones(limit=${limit}, page=${i})}"
           th:text="${i + 1}">
            2
        </a>
    </span>

    <!-- ... si hace falta -->
    <span th:if="${page.number < page.totalPages - 4}" style="padding: 0 6px;">...</span>

    <!-- Última página siempre -->
    <a class="btn btn-page"
       th:classappend="${page.number == page.totalPages - 1} ? ' btn-active' : ''"
       th:href="@{/mediciones(limit=${limit}, page=${page.totalPages - 1})}"
       th:text="${page.totalPages}">
        999
    </a>

    <!-- Siguiente (igual) -->
    <a class="btn btn-page"
       th:classappend="${page.last} ? ' btn-disabled' : ''"
       th:href="@{/mediciones(limit=${limit}, page=${page.number + 1})}">
        Siguiente ▶
    </a>

    <!-- Ir al FINAL -->
    <a class="btn btn-page"
       th:classappend="${page.last} ? ' btn-disabled' : ''"
       th:href="@{/mediciones(limit=${limit}, page=${page.totalPages - 1})}"
       title="Ir al final">
        ⏭
    </a>
</div>

</body>
</html>
